<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSS Reader</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/styles/main.scss">
</head>
<body>
  <div class="container mt-5">
    <h1 class="text-center mb-4">RSS Reader</h1>
    
    <form id="rss-form" class="card mb-4">
      <div class="card-body">
        <div class="form-group mb-3">
          <label for="rss-url" class="form-label">RSS Feed URL</label>
          <div class="input-group">
            <input 
              type="text" 
              id="rss-url" 
              class="form-control" 
              placeholder="https://example.com/rss" 
              required
              autofocus
            >
            <button type="submit" class="btn btn-primary">Add</button>
          </div>
          <div class="feedback invalid-feedback mt-2"></div>
        </div>
      </div>
    </form>
    
    <div class="urls-container card">
      <div class="card-body">
        <h2 class="h5 mb-3">Your Feeds</h2>
        <div id="feeds-container" class="list-group"></div>
        <!-- Посты будут добавляться автоматически -->
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/index.js"></script>
</body>
</html>
